<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectura Veloz</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root {
            --bg: #f4f4f9;
            --card: #fff;
            --text: #333;
            --border: #ccc;
            --btn: #007bff;
            --btn-hover: #0056b3;
            --shadow: rgba(0,0,0,0.1);
        }
        body.dark {
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #e0e0e0;
            --border: #444;
            --btn: #1a6fba;
            --btn-hover: #0f5290;
            --shadow: rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }

        h1 { text-align: center; }

        #text {
            display: block;
            width: 100%;
            height: 140px;
            margin-bottom: 15px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid var(--border);
            border-radius: 5px;
            box-shadow: inset 0 2px 4px var(--shadow);
            background-color: var(--card);
            color: var(--text);
            resize: vertical;
        }

        #controls { text-align: center; margin-bottom: 10px; }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .btn {
            padding: 8px 18px;
            font-size: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: var(--btn);
            color: white;
            box-shadow: 0 2px 4px var(--shadow);
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: var(--btn-hover); }
        .btn:disabled { opacity: 0.4; cursor: default; }
        .btn.secondary { background-color: #6c757d; }
        .btn.secondary:hover { background-color: #545b62; }
        .btn.danger { background-color: #dc3545; }
        .btn.danger:hover { background-color: #a71d2a; }
        .btn.success { background-color: #28a745; }
        .btn.success:hover { background-color: #1e7e34; }

        #wpm-control {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }
        .wpm-btn {
            width: 30px;
            height: 30px;
            font-size: 20px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background-color: var(--btn);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 4px var(--shadow);
            line-height: 1;
        }
        .wpm-btn:hover { background-color: var(--btn-hover); }

        #wpmValue {
            font-weight: bold;
            font-size: 20px;
            min-width: 45px;
            text-align: center;
        }

        #start-position {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        #startIndex {
            width: 65px;
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--card);
            color: var(--text);
            font-size: 14px;
        }

        #progress-container { margin: 8px 0 0; }
        #progress-bar-wrap {
            width: 100%;
            background-color: var(--border);
            border-radius: 5px;
            height: 6px;
            margin-bottom: 5px;
        }
        #progress-bar {
            height: 6px;
            background-color: var(--btn);
            border-radius: 5px;
            width: 0%;
            transition: width 0.1s;
        }
        #progress-text {
            text-align: center;
            font-size: 13px;
            opacity: 0.65;
        }

        #display-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            margin: 15px 0;
        }
        #display {
            text-align: center;
            font-size: 48px;
            font-family: 'Courier New', monospace;
            color: var(--text);
            background-color: var(--card);
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px var(--shadow);
            min-width: 300px;
            letter-spacing: 2px;
        }
        #display .orp {
            color: #e63946;
            font-weight: bold;
        }

        #saved-section { margin-top: 20px; }
        #saved-section h3 { margin-bottom: 8px; }

        .saved-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
            background-color: var(--card);
            margin-bottom: 8px;
            box-shadow: 0 1px 3px var(--shadow);
        }
        .saved-item-content { flex: 1; min-width: 0; }
        .saved-item-name { font-weight: bold; font-size: 15px; margin-bottom: 3px; }
        .saved-item-preview {
            font-size: 13px;
            opacity: 0.6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .saved-item-actions { display: flex; gap: 5px; flex-shrink: 0; }

        #navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 46px;
            background-color: var(--card);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 4px var(--shadow);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 6px;
            z-index: 200;
        }
        #navbar a {
            color: var(--text);
            text-decoration: none;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        #navbar a:hover { background-color: var(--btn); color: white; }
        #navbar a.active { background-color: var(--btn); color: white; }
        #navbar .spacer { flex: 1; }

        /* Blog view */
        #blog-view { display: none; max-width: 720px; margin: 0 auto; }
        #blog-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        #blog-play-btn {
            width: 72px;
            height: 72px;
            border-radius: 10px;
            background-color: var(--btn);
            color: white;
            font-size: 32px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--shadow);
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        #blog-play-btn:hover { background-color: var(--btn-hover); transform: scale(1.05); }
        #blog-lang {
            padding: 10px 14px;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--card);
            color: var(--text);
            cursor: pointer;
            box-shadow: 0 2px 4px var(--shadow);
        }
        #blog-back-btn {
            display: block;
            margin-bottom: 18px;
            background: none;
            border: none;
            color: var(--btn);
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            text-decoration: underline;
        }
        #blog-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        #blog-content {
            font-size: 18px;
            line-height: 1.8;
            background-color: var(--card);
            padding: 28px 32px;
            border-radius: 8px;
            box-shadow: 0 2px 8px var(--shadow);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .blog-chunk { border-radius: 4px; transition: background-color 0.3s; cursor: default; }
        .blog-chunk-active { background-color: rgba(0, 123, 255, 0.18); }
        .blog-chunk-selected { background-color: rgba(40, 167, 69, 0.2); outline: 2px solid rgba(40, 167, 69, 0.5); cursor: pointer; }

        #darkModeBtn {
            position: fixed;
            top: 8px;
            right: 15px;
            font-size: 22px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 300;
        }
        body { padding-top: 56px; }
    </style>
</head>
<body>
    <nav id="navbar">
        <a href="palabrasB2.html">Inicio</a>
        <a href="lectura veloz.html" class="active">Lectura Veloz</a>
        <div class="spacer"></div>
    </nav>
    <button id="darkModeBtn" onclick="toggleDarkMode()" title="Modo oscuro">🌙</button>
    <h1>Lectura Veloz</h1>

    <div id="blog-view">
        <button id="blog-back-btn" onclick="salirBlogView()">← Volver</button>
        <div id="blog-title"></div>
        <div id="blog-controls">
            <button id="blog-play-btn" onclick="iniciarDesdeBlog()" title="Iniciar lectura veloz">▶</button>
            <select id="blog-lang">
                <option value="es-ES">Español</option>
                <option value="de-DE">Alemán</option>
                <option value="en-US">Inglés</option>
                <option value="fr-FR">Francés</option>
            </select>
        </div>
        <div id="blog-content"></div>
    </div>

    <textarea id="text" placeholder="Ingrese el texto aquí..."></textarea>

    <div id="controls">
        <div class="controls-row">
            <div id="wpm-control">
                <span>WPM:</span>
                <button class="wpm-btn" onclick="changeWpm(-10)">−</button>
                <span id="wpmValue">400</span>
                <button class="wpm-btn" onclick="changeWpm(+10)">+</button>
            </div>

            <button class="btn secondary" id="npalabras" onclick="toggleWords()">1 palabra</button>

            <div id="start-position">
                <label for="startIndex">Desde palabra:</label>
                <input type="number" id="startIndex" value="1" min="1">
            </div>
        </div>

        <div class="controls-row">
            <button class="btn success" id="startButton">▶ Iniciar</button>
            <button class="btn secondary" id="pauseButton" disabled>⏸ Pausar</button>
            <button class="btn secondary" id="stopButton" disabled>⏹ Detener</button>
            <button class="btn" onclick="guardarTexto()">💾 Guardar</button>
            <button class="btn secondary" onclick="document.getElementById('fileInput').click()">📂 Subir archivo</button>
            <input type="file" id="fileInput" accept=".txt,.pdf,.doc,.docx" style="display:none" onchange="handleFile(this)">
        </div>
    </div>

    <div id="progress-container">
        <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
        <div id="progress-text"></div>
    </div>

    <div id="display-container">
        <div id="display">—</div>
    </div>
    
    <div id="saved-section">
        <h3>Textos guardados</h3>
        <div id="textosguardados"></div>
    </div>

    <script>
        let wpm = 400;
        let twowords = false;
        let words = [];
        let index = 0;
        let timer = null;
        let isRunning = false;

        document.getElementById('wpmValue').textContent = wpm;

        // ORP: optimal recognition point by word length
        function getORPpos(word) {
            const len = word.length;
            if (len <= 1) return 0;
            if (len <= 5) return 1;
            if (len <= 9) return 2;
            if (len <= 13) return 3;
            return 4;
        }

        function escHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function renderWord(w1, w2) {
            const display = document.getElementById('display');
            const pos = getORPpos(w1);
            const highlighted =
                escHtml(w1.slice(0, pos)) +
                '<span class="orp">' + escHtml(w1[pos]) + '</span>' +
                escHtml(w1.slice(pos + 1));
            display.innerHTML = w2 ? highlighted + ' ' + escHtml(w2) : highlighted;
        }

        function updateProgress() {
            const total = words.length;
            const pct = total > 0 ? Math.round((index / total) * 100) : 0;
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('progress-text').textContent =
                total > 0 ? `Palabra ${index} de ${total}` : '';
        }

        function showNextWord() {
            if (index < words.length) {
                const w2 = twowords && index + 1 < words.length ? words[index + 1] : null;
                renderWord(words[index], w2);
                index += twowords ? 2 : 1;
                updateProgress();
                document.getElementById('startIndex').value = index + 1;
                timer = setTimeout(showNextWord, 60000 / wpm);
            } else {
                isRunning = false;
                updateButtons();
            }
        }

        function startReading() {
            const text = document.getElementById('text').value.trim();
            if (!text) return;
            words = text.split(/\s+/).filter(Boolean);
            const startVal = parseInt(document.getElementById('startIndex').value) || 1;
            index = Math.max(0, Math.min(startVal - 1, words.length - 1));
            isRunning = true;
            document.getElementById('pauseButton').textContent = '⏸ Pausar';
            updateButtons();
            showNextWord();
        }

        function pauseReading() {
            if (isRunning) {
                clearTimeout(timer);
                isRunning = false;
                document.getElementById('pauseButton').textContent = '▶ Reanudar';
            } else {
                isRunning = true;
                document.getElementById('pauseButton').textContent = '⏸ Pausar';
                showNextWord();
            }
            updateButtons();
        }

        function stopReading() {
            clearTimeout(timer);
            isRunning = false;
            words = [];
            index = 0;
            document.getElementById('display').textContent = '—';
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('progress-text').textContent = '';
            document.getElementById('startIndex').value = 1;
            document.getElementById('pauseButton').textContent = '⏸ Pausar';
            updateButtons();
        }

        function updateButtons() {
            const hasWords = words.length > 0;
            document.getElementById('startButton').disabled = isRunning;
            document.getElementById('pauseButton').disabled = !hasWords;
            document.getElementById('stopButton').disabled = !hasWords;
        }

        function changeWpm(delta) {
            wpm = Math.max(60, wpm + delta);
            document.getElementById('wpmValue').textContent = wpm;
        }

        function toggleWords() {
            twowords = !twowords;
            document.getElementById('npalabras').textContent = twowords ? '2 palabras' : '1 palabra';
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            document.getElementById('darkModeBtn').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('darkMode', isDark);
        }

        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
            if (e.key === 'ArrowUp') changeWpm(10);
            else if (e.key === 'ArrowDown') changeWpm(-10);
            else if (e.key === ' ') { e.preventDefault(); if (words.length > 0) pauseReading(); }
        });

        // --- File upload ---
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        async function handleFile(input) {
            const file = input.files[0];
            input.value = '';
            if (!file) return;

            const ext = file.name.split('.').pop().toLowerCase();
            let text = '';

            try {
                if (ext === 'txt') {
                    text = await file.text();

                } else if (ext === 'pdf') {
                    text = await extractPDF(file);

                } else if (ext === 'docx') {
                    text = await extractDOCX(file);

                } else if (ext === 'doc') {
                    showToast('.doc no es compatible — usa .docx o .txt');
                    return;

                } else {
                    showToast('Formato no reconocido');
                    return;
                }
            } catch (err) {
                showToast('Error al leer el archivo');
                console.error(err);
                return;
            }

            text = text.trim();
            if (!text) { showToast('El archivo está vacío o no se pudo extraer texto'); return; }

            const list = await dbGetAll();
            if (list.some(t => t.text === text)) { showToast('Este texto ya está guardado'); return; }

            const defaultName = file.name.replace(/\.[^.]+$/, '');
            const name = prompt('Nombre para este texto:', defaultName);
            if (name === null) return;

            await dbAdd({ name: name.trim() || defaultName, text });
            mostrarTextosGuardados();
            showToast('Guardado: ' + (name.trim() || defaultName));
        }

        async function extractPDF(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const parts = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                parts.push(content.items.map(item => item.str).join(' '));
            }
            return parts.join('\n');
        }

        async function extractDOCX(file) {
            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.extractRawText({ arrayBuffer });
            return result.value;
        }

        // --- IndexedDB ---
        let db = null;

        function initDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('lecturaVeloz', 1);
                req.onupgradeneeded = e => {
                    e.target.result.createObjectStore('textos', { keyPath: 'id', autoIncrement: true });
                };
                req.onsuccess = e => resolve(e.target.result);
                req.onerror = e => reject(e.target.error);
            });
        }

        async function getDB() {
            if (!db) db = await initDB();
            return db;
        }

        async function dbGetAll() {
            const d = await getDB();
            return new Promise((resolve, reject) => {
                const req = d.transaction('textos', 'readonly').objectStore('textos').getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = e => reject(e.target.error);
            });
        }

        async function dbAdd(record) {
            const d = await getDB();
            return new Promise((resolve, reject) => {
                const req = d.transaction('textos', 'readwrite').objectStore('textos').add(record);
                req.onsuccess = () => resolve(req.result);
                req.onerror = e => reject(e.target.error);
            });
        }

        async function dbDelete(id) {
            const d = await getDB();
            return new Promise((resolve, reject) => {
                const req = d.transaction('textos', 'readwrite').objectStore('textos').delete(id);
                req.onsuccess = () => resolve();
                req.onerror = e => reject(e.target.error);
            });
        }

        async function migrateFromLocalStorage() {
            const raw = localStorage.getItem('textosguardados');
            if (!raw) return;
            try {
                const parsed = JSON.parse(raw);
                const list = parsed.length > 0 && typeof parsed[0] === 'string'
                    ? parsed.map((t, i) => ({ name: 'Texto ' + (i + 1), text: t }))
                    : parsed;
                for (const item of list) await dbAdd({ name: item.name, text: item.text });
                localStorage.removeItem('textosguardados');
            } catch {}
        }

        async function guardarTexto() {
            const text = document.getElementById('text').value.trim();
            if (!text) { showToast('El área de texto está vacía'); return; }
            const list = await dbGetAll();
            if (list.some(t => t.text === text)) { showToast('Este texto ya está guardado'); return; }
            const name = prompt('Nombre para este texto:', 'Texto ' + (list.length + 1));
            if (name === null) return;
            await dbAdd({ name: name.trim() || 'Sin nombre', text });
            mostrarTextosGuardados();
        }

        let blogText = '';
        let blogChunks = [];
        let blogStartChunk = 0;
        let blogItemId = null;

        function saveBlogPos(i) {
            if (blogItemId !== null) localStorage.setItem(`lv_pos_${blogItemId}`, i);
        }

        function clearBlogPos() {
            if (blogItemId !== null) localStorage.removeItem(`lv_pos_${blogItemId}`);
        }

        function renderBlogChunks() {
            blogChunks = splitIntoChunks(blogText, 150);
            const saved = blogItemId !== null ? parseInt(localStorage.getItem(`lv_pos_${blogItemId}`)) || 0 : 0;
            blogStartChunk = Math.min(saved, blogChunks.length - 1);
            const contentEl = document.getElementById('blog-content');
            contentEl.innerHTML = blogChunks
                .map((c, i) => `<span id="blog-chunk-${i}" class="blog-chunk" ondblclick="selectBlogChunk(${i})">${escHtml(c)}</span>`)
                .join('\n\n');
            if (blogStartChunk > 0) {
                const el = document.getElementById(`blog-chunk-${blogStartChunk}`);
                if (el) {
                    el.classList.add('blog-chunk-selected');
                    setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
                }
            }
        }

        function selectBlogChunk(i) {
            document.querySelectorAll('.blog-chunk').forEach(el => {
                el.classList.remove('blog-chunk-selected');
                el.classList.remove('blog-chunk-active');
            });
            blogStartChunk = i;
            const el = document.getElementById(`blog-chunk-${i}`);
            if (el) el.classList.add('blog-chunk-selected');
            iniciarDesdeBlog()
        }

        function entrarBlogView(name, text) {
            blogText = text;
            document.getElementById('blog-title').textContent = name;
            document.getElementById('blog-view').style.display = 'block';
            document.getElementById('text').style.display = 'none';
            ['controls', 'progress-container', 'display-container', 'saved-section']
                .forEach(id => document.getElementById(id).style.display = 'none');
            document.querySelector('h1').scrollIntoView({ behavior: 'smooth' });
            renderBlogChunks();
        }

        function salirBlogView() {
            speechSynthesis.cancel();
            blogSpeaking = false;
            blogItemId = null;
            blogChunks = [];
            const btn = document.getElementById('blog-play-btn');
            btn.textContent = '▶';
            btn.onclick = iniciarDesdeBlog;
            document.getElementById('blog-view').style.display = 'none';
            document.getElementById('text').style.display = 'block';
            ['controls', 'progress-container', 'display-container', 'saved-section']
                .forEach(id => document.getElementById(id).style.display = '');
        }

        let blogSpeaking = false;

        function splitIntoChunks(text, targetWords = 150) {
            // Divide por párrafos (línea en blanco o salto simple)
            const paragraphs = text.split(/\n\s*\n|\n/).map(p => p.trim()).filter(Boolean);
            const chunks = [];
            let buf = [];
            let bufWords = 0;

            for (const para of paragraphs) {
                const wc = para.split(/\s+/).length;

                // Párrafo muy largo: dividir por oraciones
                if (wc > targetWords * 2) {
                    if (buf.length) { chunks.push(buf.join('\n\n')); buf = []; bufWords = 0; }
                    const sentences = para.match(/[^.!?…]+[.!?…]+["']?/g) || [para];
                    let sBuf = [], sWords = 0;
                    for (const sent of sentences) {
                        const sw = sent.trim().split(/\s+/).length;
                        if (sWords + sw > targetWords && sBuf.length) {
                            chunks.push(sBuf.join(' '));
                            sBuf = []; sWords = 0;
                        }
                        sBuf.push(sent.trim()); sWords += sw;
                    }
                    if (sBuf.length) chunks.push(sBuf.join(' '));
                    continue;
                }

                // Si agregar este párrafo supera el target, vacia el buffer primero
                if (bufWords + wc > targetWords && buf.length) {
                    chunks.push(buf.join('\n\n')); buf = []; bufWords = 0;
                }
                buf.push(para); bufWords += wc;
            }
            if (buf.length) chunks.push(buf.join('\n\n'));
            return chunks;
        }

        function iniciarDesdeBlog() {
            if (!blogText) return;
            speechSynthesis.cancel();

            if (blogChunks.length === 0) renderBlogChunks();
            const chunks = blogChunks;
            const startFrom = blogStartChunk;

            // Limpiar selección manual
            document.querySelectorAll('.blog-chunk').forEach(el => el.classList.remove('blog-chunk-selected'));

            blogSpeaking = true;
            const btn = document.getElementById('blog-play-btn');
            btn.textContent = '⏸';
            btn.onclick = toggleBlogSpeech;

            function highlightChunk(i) {
                document.querySelectorAll('.blog-chunk').forEach(el => el.classList.remove('blog-chunk-active'));
                const el = document.getElementById(`blog-chunk-${i}`);
                if (el) {
                    el.classList.add('blog-chunk-active');
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }

            function speakChunk(i) {
                if (i >= chunks.length || !blogSpeaking) {
                    document.querySelectorAll('.blog-chunk').forEach(el => el.classList.remove('blog-chunk-active'));
                    blogSpeaking = false;
                    blogStartChunk = 0;
                    clearBlogPos();
                    btn.textContent = '▶';
                    btn.onclick = iniciarDesdeBlog;
                    return;
                }
                highlightChunk(i);
                blogStartChunk = i;
                saveBlogPos(i);
                const utter = new SpeechSynthesisUtterance(chunks[i]);
                utter.lang = document.getElementById('blog-lang').value;
                utter.onend = () => { if (blogSpeaking) speakChunk(i + 1); };
                speechSynthesis.speak(utter);
            }

            function toggleBlogSpeech() {
                if (speechSynthesis.paused) {
                    speechSynthesis.resume();
                    btn.textContent = '⏸';
                } else if (speechSynthesis.speaking) {
                    speechSynthesis.pause();
                    btn.textContent = '▶';
                }
            }

            speakChunk(startFrom);
        }

        async function cargarTexto(id) {
            const list = await dbGetAll();
            const item = list.find(t => t.id === id);
            if (!item) return;
            entrarBlogView(item.name, item.text);
            document.getElementById('text').value = blogText;
            salirBlogView()
            
        }
        async function cargarTextoblog(id) {
            const list = await dbGetAll();
            const item = list.find(t => t.id === id);
            if (!item) return;
            blogItemId = id;
            entrarBlogView(item.name, item.text);
        }


        async function borrarTextoGuardado(btn) {
            if (btn.dataset.confirm !== 'true') {
                btn.dataset.confirm = 'true';
                btn.textContent = 'Confirmar';
                btn.style.backgroundColor = '#e63946';
                setTimeout(() => {
                    if (btn.dataset.confirm === 'true') {
                        btn.dataset.confirm = 'false';
                        btn.textContent = '✕';
                        btn.style.backgroundColor = '';
                    }
                }, 3000);
                return;
            }
            await dbDelete(parseInt(btn.dataset.id));
            mostrarTextosGuardados();
        }

        async function mostrarTextosGuardados() {
            const list = await dbGetAll();
            const container = document.getElementById('textosguardados');
            if (list.length === 0) {
                container.innerHTML = '<p style="opacity:0.5">No hay textos guardados.</p>';
                return;
            }
            container.innerHTML = list.map(item => `
                <div class="saved-item">
                    <div class="saved-item-content">
                        <div class="saved-item-name">${escHtml(item.name)}</div>
                        <div class="saved-item-preview">${escHtml(item.text.slice(0, 90))}${item.text.length > 90 ? '…' : ''}</div>
                    </div>
                    <div class="saved-item-actions">
                        <button class="btn" onclick="cargarTexto(${item.id})">Cargar</button>
                        <button class="btn" onclick="cargarTextoblog(${item.id})">leer</button>
                        <button class="btn danger" data-id="${item.id}" data-name="${escHtml(item.name)}" onclick="borrarTextoGuardado(this)">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function showToast(msg) {
            const div = document.createElement('div');
            div.textContent = msg;
            Object.assign(div.style, {
                fontSize: '20px', position: 'fixed', top: '50%', left: '50%',
                transform: 'translate(-50%, -50%)', backgroundColor: 'rgba(0,0,0,0.82)',
                color: 'white', padding: '28px 48px', borderRadius: '8px', zIndex: '1000'
            });
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1200);
        }

        document.getElementById('startButton').addEventListener('click', startReading);
        document.getElementById('pauseButton').addEventListener('click', pauseReading);
        document.getElementById('stopButton').addEventListener('click', stopReading);

        // Init
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            document.getElementById('darkModeBtn').textContent = '☀️';
        }
        migrateFromLocalStorage().then(() => mostrarTextosGuardados());
        updateButtons();
    </script>
</body>
</html>
