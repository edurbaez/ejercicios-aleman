<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practica de palabras</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #1d1c1c20;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========= CONTENEDOR PRINCIPAL ========= */

        .app {
            width: 90%;
            max-width: 1000px;
            margin: 20px auto;
        }

        /* ========= HEADER ========= */

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .title {
            font-size: 1.8rem;
        }

        /* ========= PANEL DE ESTADÍSTICAS ========= */

        .panel {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .card {
            flex: 1;
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: rgba(255, 0, 0, 0.2) -1px 4px 5px;
        }

        /* ========= PALABRA ========= */

        .word-display {
            text-align: center;
            padding: 20px;
            background: #1d1c1c30;
            font-size: 1.5rem;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* ========= OPCIONES ========= */

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .option {
            padding: 20px;
            text-align: center;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: rgba(255, 0, 0, 0.2) -1px 4px 5px;
            transition: 0.2s;
        }

        .option:hover {
            background: #f2f2f2;
        }

        /* ========= BOTONES ========= */

        .btn {
            padding: 12px;
            border: 3px solid #1565C0;
            background-color: #1976D2;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: #1565C0;
        }

        .btn-danger {
            background-color: #d32f2f;
            border-color: #b71c1c;
        }

        .btn-secondary {
            background-color: #388E3C;
            border-color: #2E7D32;
        }

        .btn-active {
            background-color: #4CAF50 !important;
            border-color: #388E3C !important;
        }

        .btn-active {
            background-color: red !important;
            border-color: #8b0000 !important;
        }

        .lista-info {
            text-align: center;
            padding: 10px;
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            margin-bottom: 15px;
            color: #856404;
        }

        /* Barra de botones (sets-bar): scroll horizontal fino */
        #sets-bar{
        display: flex;
        gap: 10px;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
        padding: 10px 0;
        }

        /* Scrollbar fino */
        #sets-bar::-webkit-scrollbar{
        height: 6px;
        }
        #sets-bar::-webkit-scrollbar-track{
        background: transparent;
        }
        #sets-bar::-webkit-scrollbar-thumb{
        background: rgba(0,0,0,0.25);
        border-radius: 999px;
        }
        #sets-bar::-webkit-scrollbar-thumb:hover{
        background: rgba(0,0,0,0.4);
        }

        /* Firefox */
        #sets-bar{
        scrollbar-width: thin;
        scrollbar-color: rgba(0,0,0,0.25) transparent;
        }

        /* Evita que los botones se encojan */
        #sets-bar .btn{
        flex: 0 0 auto;
        }

        /* ========= FOOTER CONTROLES ========= */

        .footer-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        /* ========= TABLA ========= */

        .table-container {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 2px solid grey;
            padding: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="app">

            <!-- ========================= -->
            <!--      SELECCIÓN MÚLTIPLE   -->
            <!-- ========================= -->

            <section class="game-section" id="seleccion-multiple">

                <div class="header">
                    <h1 class="title">Juego de Palabras</h1>
                </div>

                <!-- Panel de estadísticas -->
                <div class="panel">
                    <div class="card">
                        <div>Errores</div>
                        <div id="errores">0</div>
                    </div>

                    <div class="card">
                        <div>Aciertos</div>
                        <div id="aciertos">0</div>
                    </div>

                    <div class="card">
                        <div>Tiempo</div>
                        <div id="tiempo">3</div>
                    </div>
                </div>

                <!-- Palabra principal -->
                <div class="word-display" id="palabra"></div>

                <!-- Opciones -->
                <div class="options-grid">
                    <div class="option" id="op1"></div>
                    <div class="option" id="op2"></div>
                    <div class="option" id="op3"></div>
                    <div class="option" id="op4"></div>
                </div>

            </section>

            <!-- ========================= -->
            <!--     REPETICIÓN PALABRAS   -->
            <!-- ========================= -->

            <section class="game-section" id="repeticion-palabras" style="margin-top:40px;">

                <div class="header">
                    <h1 class="title">Repetición de Palabras</h1>
                </div>

                <!-- Botones modo 
                <div class="panel">
                    <button class="btn" id="btn-repetir">Repetir</button>
                    <button class="btn" id="btn-seleccionar">Seleccionar</button>
                </div>-->

                <!-- Palabras -->
                <div class="panel" style="gap:20px;">
                    <div class="card word-display" id="p2"></div>
                    <div class="card word-display" id="p1"></div>
                </div>

                <!-- Controles inferiores -->
                <div class="footer-controls">
                    <button class="btn btn-secondary" id="auto">Auto: ON</button>
                    <button class="btn btn-danger" id="dual">DE</button>
                    <button class="btn" id="leer">Leer</button>
                </div>

            </section>

            <!-- ========================= -->
            <!--            LISTA          -->
            <!-- ========================= -->

            <section class="table-container">
                <div class="header">
                    <h1 class="title">Lista de Palabras</h1>
                </div>

                <table id="lista">
                    <thead>
                        <tr>
                            <th>Uno</th>
                            <th>Dos</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- contenido dinámico -->
                    </tbody>
                </table>

            </section>

        </div>
    <script src="DATA.json"></script>
    <script>
        /* =========================
        DATASET ÚNICO (fusionado)
        ========================= */
        const DATA = {           
            verbos_basico:{
                    es:[
                    "haber/ser", "tener", "llegar a ser", "poder", "deber", "decir"
                    ],
                    de:[
                    "sein", "haben", "werden", "können", "müssen", "sagen"
                    ]
            },
            lista1: {
            de: ["Nachvollziehbar","Ursprünglich","Beziehungsweise","Allerdings","Zuverlässig"],
            es: ["Comprensible","Originalmente","Respectivamente","Sin embargo","Confiable"]
            },
            verbosbasico:{
                    es:[
                    "haber/ser", "tener", "llegar a ser", "poder", "deber", "decir"
                    ],
                    de:[
                    "sein", "haben", "werden", "können", "müssen", "sagen"
                    ]
            },
            lista11: {
            de: ["Nachvollziehbar","Ursprünglich","Beziehungsweise","Allerdings","Zuverlässig"],
            es: ["Comprensible","Originalmente","Respectivamente","Sin embargo","Confiable"]
            }
        };
        

        /* =========================
        ESTADO ÚNICO
        ========================= */
        const State = {
        activeSets: new Set(),           // Set de claves activas (multiselección)
        es: [],
        de: [],
        vistos: [],
        erroresSet: new Set(), // guarda indices con error (para no duplicar)
        modoAuto: true,
        modoDual: false,
        dualFlip: false,
        timerStarted: false,
        timerId: null,
        seconds: 0,
        currentIndex: null,
        optionIdxs: []
        };

        /* =========================
        HELPERS / DOM
        ========================= */
        const $ = (id) => document.getElementById(id);

        function safeText(el, txt) {
        if (!el) return;
        el.textContent = txt ?? "";
        }

        function shuffleUniqueIndexes(length, count, forcedIndex = null) {
        const set = new Set();
        while (set.size < count) set.add(Math.floor(Math.random() * length));
        const arr = [...set];

        if (forcedIndex !== null) {
            const pos = Math.floor(Math.random() * count);
            arr[pos] = forcedIndex;
        }
        return arr;
        }

        function nextUnseenIndex() {
        if (!State.de.length) return 0;

        // reset cuando esté casi agotado
        if (State.vistos.length >= State.de.length - 3) State.vistos = [];

        let tries = 0;
        let idx = Math.floor(Math.random() * State.de.length);
        while (State.vistos.includes(idx) && tries < 20) {
            idx = Math.floor(Math.random() * State.de.length);
            tries++;
        }
        State.vistos.push(idx);
        return idx;
        }


        /* =========================
        LISTA (única para ambas)
        ========================= */
        function renderLista(esArr, deArr) {
        document.getElementById("lista")    
        const table = $("lista");
        if (!table) return;

        const pairs = [];
        for (let i = 0; i < Math.min(esArr.length, deArr.length); i++) {
            // orden alfabético por alemán
            pairs.push([deArr[i], esArr[i]]);
        }
        pairs.sort((a, b) => String(a[0]).localeCompare(String(b[0])));

        table.innerHTML = `
            <thead>
            <tr><th>alemán</th><th>español</th></tr>
            </thead>
            <tbody>
            ${pairs.map(p => `<tr><td>${escapeHtml(p[0])}</td><td>${escapeHtml(p[1])}</td></tr>`).join("")}
            </tbody>
        `;
        }

        function escapeHtml(s) {
        return String(s)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
        }

        /* =========================
        SELECTOR DE SETS (multiselección)
        ========================= */
        function toggleSet(key) {
        if (!DATA[key]) return;

        // Toggle en el Set
        if (State.activeSets.has(key)) {
            State.activeSets.delete(key);
        } else {
            State.activeSets.add(key);
        }

        // Actualizar UI de botones
        updateSetButtonsUI();

        // Recargar datos combinados
        reloadActiveData();
        }

        function reloadActiveData() {
        // Si no hay sets seleccionados, limpiar
        if (State.activeSets.size === 0) {
            State.es = [];
            State.de = [];
            State.vistos = [];
            State.erroresSet.clear();
            State.currentIndex = null;
            State.optionIdxs = [];

            // Mostrar mensaje de selección requerida
            safeText($("palabra"), "Seleccione al menos una lista");
            safeText($("p1"), "Seleccione al menos una lista");
            safeText($("p2"), "-");

            // Limpiar opciones
            ["op1", "op2", "op3", "op4"].forEach(id => safeText($(id), "-"));

            // Limpiar tabla
            const table = $("lista");
            if (table) {
            table.innerHTML = `
                <thead><tr><th>alemán</th><th>español</th></tr></thead>
                <tbody><tr><td colspan="2" style="text-align:center;color:#999;">Seleccione listas para ver el contenido</td></tr></tbody>
            `;
            }

            // Reset marcadores
            if ($("aciertos")) safeText($("aciertos"), "0");
            if ($("errores")) safeText($("errores"), "0");
            stopTimer();
            State.timerStarted = false;
            State.seconds = 0;
            if ($("tiempo")) safeText($("tiempo"), "00:00");
            return;
        }

        // Combinar todas las listas activas
        const combinedEs = [];
        const combinedDe = [];
        State.activeSets.forEach(k => {
            if (DATA[k]) {
            combinedEs.push(...DATA[k].es);
            combinedDe.push(...DATA[k].de);
            }
        });

        State.es = combinedEs;
        State.de = combinedDe;

        // reset de estado de juego
        State.vistos = [];
        State.erroresSet.clear();
        State.currentIndex = null;
        State.optionIdxs = [];

        // reset marcadores
        if ($("aciertos")) safeText($("aciertos"), "0");
        if ($("errores")) safeText($("errores"), "0");

        // timer
        stopTimer();
        State.timerStarted = false;
        State.seconds = 0;
        if ($("tiempo")) safeText($("tiempo"), "00:00");

        // render tabla
        renderLista(State.es, State.de);

        // pintar primera palabra para repetición
        renderRepeatNext();

        // pintar primera ronda de selección
        renderSelectionNext();
        }

        function updateSetButtonsUI() {
        const bar = $("sets-bar");
        if (!bar) return;

        const buttons = bar.querySelectorAll("button");
        buttons.forEach(btn => {
            const key = btn.textContent;
            if (State.activeSets.has(key)) {
            btn.classList.add("btn-active");
            } else {
            btn.classList.remove("btn-active");
            }
        });
        }

        // Función legacy para compatibilidad (ahora llama a toggleSet)
        function setActiveSet(key) {
        toggleSet(key);
        }

        /* =========================
        BOTONES DE SETS (multiselección)
        ========================= */
        function mountSetButtons() {
        const app = document.querySelector(".app");
        if (!app) return;

        // Crear contenedor para la barra de selección con descripción
        let container = document.getElementById("sets-container");
        if (!container) {
            container = document.createElement("div");
            container.id = "sets-container";
            container.style.marginBottom = "20px";

            // Descripción
            const desc = document.createElement("div");
            desc.className = "lista-info";
            desc.innerHTML = "<strong>Seleccione una o más listas:</strong> Los botones en rojo indican listas activas";
            container.appendChild(desc);

            // Barra de botones
            let bar = document.createElement("div");
            bar.id = "sets-bar";
            bar.className = "panel";
            container.appendChild(bar);

            app.prepend(container);
        }

        const bar = $("sets-bar");
        bar.innerHTML = "";
        Object.keys(DATA).forEach((k) => {
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.textContent = k;
            btn.addEventListener("click", () => toggleSet(k));
            bar.appendChild(btn);
        });

        // Actualizar UI según estado actual
        updateSetButtonsUI();
        }

        /* =========================
 /* =========================
   SELECCIÓN MÚLTIPLE (versión estable sin helpers externos)
   ========================= */

/* Asegúrate de que estas propiedades existan en State */
State.selectionLock = false;
State.roundToken = 0;

function renderSelectionNext() {
  if (!State.es.length || !State.de.length) {
    safeText($("palabra"), "Seleccione al menos una lista");
    ["op1", "op2", "op3", "op4"].forEach(id => safeText($(id), "-"));
    return;
  }

  State.selectionLock = false;
  State.roundToken++;

  const idx = nextUnseenIndex();
  State.currentIndex = idx;

  State.optionIdxs = shuffleUniqueIndexes(State.de.length, 4, idx);

  safeText($("palabra"), State.es[idx]);

  const ids = ["op1", "op2", "op3", "op4"];
  ids.forEach((id, slot) => {
    const el = $(id);
    if (!el) return;

    const wordIndex = State.optionIdxs[slot];

    el.textContent = State.de[wordIndex];
    el.dataset.wordIndex = String(wordIndex);
    el.dataset.roundToken = String(State.roundToken);
  });
}

function markOptionsBackground(color) {
  const cont =
    document.getElementById("opciones") ||
    document.querySelector("#seleccion-multiple .options-grid") ||
    document.querySelector(".options-grid");

  if (!cont) return;

  cont.style.background = color;
  setTimeout(() => (cont.style.background = ""), 200);
}

function handleSelectionPick(chosenWordIndex, token) {
  if (State.currentIndex === null) return;

  // Evita doble conteo
  if (State.selectionLock) return;
  if (String(token) !== String(State.roundToken)) return;

  State.selectionLock = true;

  // NO modificar lógica del timer
  if (!State.timerStarted) startTimer();

  const correct = chosenWordIndex === State.currentIndex;

  if (correct) {
    markOptionsBackground("green");

    const acEl = $("aciertos");
    if (acEl) {
      acEl.textContent = String(
        parseInt(acEl.textContent || "0", 10) + 1
      );
    }
  } else {
    markOptionsBackground("red");

    if (!State.erroresSet.has(State.currentIndex)) {
      State.erroresSet.add(State.currentIndex);

      const erEl = $("errores");
      if (erEl) {
        erEl.textContent = String(
          parseInt(erEl.textContent || "0", 10) + 1
        );
      }
    }
  }

  renderSelectionNext();
}

function bindSelectionEvents() {
  const cont =
    document.getElementById("opciones") ||
    document.querySelector("#seleccion-multiple .options-grid") ||
    document.querySelector(".options-grid");

  if (!cont) return;

  if (cont.dataset.bound === "1") return;
  cont.dataset.bound = "1";

  cont.addEventListener("click", (e) => {
    const opt = e.target.closest("#op1,#op2,#op3,#op4,.option");
    if (!opt) return;

    const chosen = parseInt(opt.dataset.wordIndex, 10);
    const token = opt.dataset.roundToken;

    if (Number.isNaN(chosen)) return;

    handleSelectionPick(chosen, token);
  });
}

        /* =========================
        TIMER (para selección)
        ========================= */
        function startTimer() {
        if (State.timerId) return;

        State.timerStarted = true;
        State.timerId = setInterval(() => {
            const ac = parseInt(($("aciertos")?.textContent || "0"), 10);
            if (ac >= 50) {
            stopTimer();
            return;
            }

            State.seconds++;
            const m = Math.floor(State.seconds / 60);
            const s = State.seconds % 60;
            safeText($("tiempo"), String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0"));
        }, 1000);
        }

        function stopTimer() {
        if (State.timerId) clearInterval(State.timerId);
        State.timerId = null;
        }

        /* Llama esto en tu init (o reemplaza la llamada anterior) */
        bindSelectionEvents();
        renderSelectionNext();







        /* =========================
        REPETICIÓN (speech)
        ========================= */
        function renderRepeatNext() {
        if (!State.es.length || !State.de.length) {
            safeText($("p1"), "Seleccione al menos una lista");
            safeText($("p2"), "-");
            return;
        }

        const idx = nextUnseenIndex();
        safeText($("p1"), State.es[idx]);
        safeText($("p2"), State.de[idx]);
        }

        function speakOnce(text, lang) {
        if (!text) return Promise.resolve();
        return new Promise((resolve) => {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = lang;
            u.onend = resolve;
            u.onerror = resolve;
            speechSynthesis.speak(u);
        });
        }

        async function speakLoop() {
        // si auto está apagado, hace solo un disparo
        if (!State.modoAuto) {
            await speakOnce($("p2")?.textContent || "", "de");
            return;
        }

        // en auto: sigue leyendo continuamente
        while (State.modoAuto) {
            // dual alterna DE/ES; si no, solo DE
            if (!State.modoDual) {
            await speakOnce($("p2")?.textContent || "", "de");
            await wait(500);
            renderRepeatNext();
            continue;
            }

            // dual: alternar ES/DE
            if (!State.dualFlip) {
            await speakOnce($("p2")?.textContent || "", "de");
            State.dualFlip = true;
            } else {
            await speakOnce($("p1")?.textContent || "", "es");
            State.dualFlip = false;
            await wait(500);
            renderRepeatNext();
            }

            await wait(300);
        }
        }

        function wait(ms) {
        return new Promise((r) => setTimeout(r, ms));
        }

        /* Controles repetición */
        function bindRepeatControls() {
        const btnAuto = $("auto");
        const btnDual = $("dual");
        const btnLeer = $("leer");

        if (btnAuto) {
            btnAuto.addEventListener("click", () => {
            State.modoAuto = !State.modoAuto;
            btnAuto.textContent = State.modoAuto ? "Auto: ON" : "Auto: OFF";
            btnAuto.className = State.modoAuto ? "btn btn-secondary" : "btn btn-danger";
            });
        }

        if (btnDual) {
            btnDual.addEventListener("click", () => {
            State.modoDual = !State.modoDual;
            State.dualFlip = false;
            btnDual.textContent = State.modoDual ? "ES-DE" : "DE";
            btnDual.className = State.modoDual ? "btn btn-secondary" : "btn btn-danger";
            });
        }

        if (btnLeer) {
            btnLeer.addEventListener("click", async () => {
            // si ya está hablando, cortar
            if (speechSynthesis.speaking) speechSynthesis.cancel();

            // inicia lectura; si auto=true entra en loop
            if (State.modoAuto) {
                speakLoop();
            } else {
                // one-shot
                if (State.modoDual) {
                await speakOnce($("p2")?.textContent || "", "de");
                await speakOnce($("p1")?.textContent || "", "es");
                } else {
                await speakOnce($("p2")?.textContent || "", "de");
                }
            }
            });
        }
        }

        /* =========================
        INIT
        ========================= */
        function initUnifiedApp() {
        mountSetButtons();
        bindSelectionEvents();
        bindRepeatControls();

        // Estado inicial: ninguna lista seleccionada
        // Mostrar mensaje inicial
        safeText($("palabra"), "Seleccione al menos una lista");
        safeText($("p1"), "Seleccione al menos una lista");
        safeText($("p2"), "-");
        ["op1", "op2", "op3", "op4"].forEach(id => safeText($(id), "-"));

        const table = $("lista");
        if (table) {
            table.innerHTML = `
            <thead><tr><th>alemán</th><th>español</th></tr></thead>
            <tbody><tr><td colspan="2" style="text-align:center;color:#999;padding:20px;">Seleccione listas para ver el contenido</td></tr></tbody>
            `;
        }
        }

        document.addEventListener("DOMContentLoaded", initUnifiedApp);
        </script>    
</body>
