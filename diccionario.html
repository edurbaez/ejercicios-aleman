<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diccionario Alemán</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="auth.js"></script>
</head>
<body id="page-dic">
    <nav id="navbar">
        <a href="palabrasB2.html">Inicio</a>
        <div class="nav-dropdown" id="navDropdown">
            <button class="nav-menu-btn" type="button" onclick="this.closest('.nav-dropdown').classList.toggle('open');event.stopPropagation()">Menú ▾</button>
            <div class="nav-dropdown-menu">
                <a href="lectura veloz.html">Lectura Veloz</a>
                <a href="diccionario.html" class="active">Diccionario</a>
                <a href="B1.html">B1</a>
                <a href="chat-voz.html">Chat de Voz</a>
            </div>
        </div>
        <div class="spacer"></div>
        <button id="auth-btn" title="Iniciar sesión">👤</button>
        <button id="darkModeBtn" onclick="toggleDarkMode()" title="Modo oscuro">🌙</button>
    </nav>
    <script>document.addEventListener('click',function(e){if(!e.target.closest('.nav-dropdown'))document.querySelectorAll('.nav-dropdown.open').forEach(function(d){d.classList.remove('open');});});</script>

    <div class="dic-container">
        <h1>Diccionario Alemán</h1>

        <div class="search-row">
            <div class="search-wrap">
                <input id="input-palabra" type="text" placeholder="Escribe una palabra en alemán..." autocomplete="off" />
                <div id="sugerencias"></div>
            </div>
            <button id="btn-buscar" onclick="buscar()">Buscar</button>
        </div>

        <div id="error-msg"></div>
        <div id="spinner">Consultando...</div>

        <div id="resultado">
            <div class="result-header">
                <span class="palabra-buscada" id="r-palabra"></span>
                <span class="nivel-badge" id="r-nivel"></span>
            </div>
            <div class="result-body">
                <div class="result-row">
                    <span class="result-label">Traducción</span>
                    <span class="result-value" id="r-traduccion"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">Definición</span>
                    <span class="result-value" id="r-definicion"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">Sinónimos</span>
                    <div class="result-value" id="r-sinonimos"></div>
                </div>
                <div class="result-row" id="row-antonimo">
                    <span class="result-label">Antónimo</span>
                    <span class="result-value" id="r-antonimo"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="diccionario.js"></script>
</body>
</html>
