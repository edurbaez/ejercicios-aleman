<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diccionario Alemán</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        #page-dic {
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #333333;
            --border: #cccccc;
            --navbar-bg: #ffffff;
            --accent: #1976D2;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        #page-dic.dark {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e0e0e0;
            --border: #444;
            --navbar-bg: #0f3460;
            --accent: #4fa3e0;
        }
        #navbar { background: var(--navbar-bg); }

        .dic-container {
            max-width: 640px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        .dic-container h1 {
            font-size: 22px;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        #input-palabra {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
        }
        #input-palabra:focus {
            border-color: var(--accent);
        }

        #btn-buscar {
            padding: 10px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            white-space: nowrap;
        }
        #btn-buscar:disabled {
            opacity: 0.6;
            cursor: default;
        }

        #resultado {
            display: none;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .result-header {
            background: var(--accent);
            color: #fff;
            padding: 14px 18px;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        .result-header .palabra-buscada {
            font-size: 22px;
            font-weight: bold;
        }
        .result-header .nivel-badge {
            font-size: 13px;
            background: rgba(255,255,255,0.25);
            padding: 2px 10px;
            border-radius: 20px;
        }

        .result-body {
            padding: 0;
        }

        .result-row {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }
        .result-row:last-child { border-bottom: none; }

        .result-label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent);
            min-width: 90px;
            padding-top: 2px;
        }

        .result-value {
            font-size: 15px;
            line-height: 1.5;
            flex: 1;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .chip {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 13px;
        }

        .sin-datos {
            color: #999;
            font-style: italic;
            font-size: 14px;
        }

        #error-msg {
            display: none;
            color: #c0392b;
            background: #fdecea;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        #spinner {
            display: none;
            text-align: center;
            padding: 32px;
            color: #999;
            font-size: 14px;
        }

        .search-wrap {
            position: relative;
            flex: 1;
        }
        #input-palabra {
            width: 100%;
        }
        #sugerencias {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(0,0,0,.12);
        }
        .sug-item {
            padding: 9px 14px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .sug-item:hover, .sug-item.activo {
            background: var(--option-hover, #f2f2f2);
        }
        .sug-nivel {
            font-size: 11px;
            color: var(--accent);
            background: rgba(25,118,210,0.1);
            padding: 1px 7px;
            border-radius: 10px;
            white-space: nowrap;
        }
    </style>
</head>
<body id="page-dic">
    <nav id="navbar">
        <a href="palabrasB2.html">Inicio</a>
        <a href="lectura veloz.html">Lectura Veloz</a>
        <a href="diccionario.html" class="active">Diccionario</a>
        <a href="B1.html">B1</a>
        <div class="spacer"></div>
        <button id="darkModeBtn" onclick="toggleDarkMode()" title="Modo oscuro">🌙</button>
    </nav>

    <div class="dic-container">
        <h1>Diccionario Alemán</h1>

        <div class="search-row">
            <div class="search-wrap">
                <input id="input-palabra" type="text" placeholder="Escribe una palabra en alemán..." autocomplete="off" />
                <div id="sugerencias"></div>
            </div>
            <button id="btn-buscar" onclick="buscar()">Buscar</button>
        </div>

        <div id="error-msg"></div>
        <div id="spinner">Consultando...</div>

        <div id="resultado">
            <div class="result-header">
                <span class="palabra-buscada" id="r-palabra"></span>
                <span class="nivel-badge" id="r-nivel"></span>
            </div>
            <div class="result-body">
                <div class="result-row">
                    <span class="result-label">Traducción</span>
                    <span class="result-value" id="r-traduccion"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">Definición</span>
                    <span class="result-value" id="r-definicion"></span>
                </div>
                <div class="result-row">
                    <span class="result-label">Sinónimos</span>
                    <div class="result-value" id="r-sinonimos"></div>
                </div>
                <div class="result-row" id="row-antonimo">
                    <span class="result-label">Antónimo</span>
                    <span class="result-value" id="r-antonimo"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── Supabase ───────────────────────────────────────────
        const SUPA_URL = 'https://mzitpnacjcjpokmiqwtd.supabase.co';
        const SUPA_KEY = 'sb_publishable_y9CSkHLB2haNPnzvP0-RUQ_OF5h3t4I';
        const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

        async function supaGet(palabra) {
            try {
                const { data } = await sb
                    .from("diccionario_cache")
                    .select("*")
                    .eq("id", palabra.toLowerCase())
                    .maybeSingle();
                return data || null;
            } catch { return null; }
        }

        async function supaSet(palabra, info) {
            try {
                await sb.from("diccionario_cache").insert({
                    id: palabra.toLowerCase(),
                    _palabra: palabra,
                    palabra,
                    traduccion: info.traduccion || null,
                    nivel: info.nivel || null,
                    definicion: info.definicion || null,
                    sinonimos: info.sinonimos || [],
                    antonimo: info.antonimo || null,
                });
            } catch {}
        }

        // ── Dark mode ──────────────────────────────────────────
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle("dark");
            localStorage.setItem("darkMode_dic", isDark ? "1" : "0");
        }
        if (localStorage.getItem("darkMode_dic") === "1") document.body.classList.add("dark");

        // ── Caché IndexedDB ────────────────────────────────────
        const DB_NAME = "diccionario";
        const DB_STORE = "palabras";
        let _db = null;

        function abrirDB() {
            if (_db) return Promise.resolve(_db);
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = e => {
                    e.target.result.createObjectStore(DB_STORE, { keyPath: "id" });
                };
                req.onsuccess = e => { _db = e.target.result; resolve(_db); };
                req.onerror = () => reject(req.error);
            });
        }

        async function cacheGet(palabra) {
            try {
                const db = await abrirDB();
                return new Promise(resolve => {
                    const req = db.transaction(DB_STORE).objectStore(DB_STORE).get(palabra.toLowerCase());
                    req.onsuccess = () => resolve(req.result || null);
                    req.onerror = () => resolve(null);
                });
            } catch { return null; }
        }

        async function cacheSet(palabra, info) {
            try {
                const db = await abrirDB();
                return new Promise(resolve => {
                    const store = db.transaction(DB_STORE, "readwrite").objectStore(DB_STORE);
                    store.put({ id: palabra.toLowerCase(), _palabra: palabra, ...info });
                    store.transaction.oncomplete = resolve;
                });
            } catch {}
        }

        async function cacheAll() {
            try {
                const db = await abrirDB();
                return new Promise(resolve => {
                    const req = db.transaction(DB_STORE).objectStore(DB_STORE).getAll();
                    req.onsuccess = () => {
                        const map = {};
                        (req.result || []).forEach(r => { map[r.id] = r; });
                        resolve(map);
                    };
                    req.onerror = () => resolve({});
                });
            } catch { return {}; }
        }

        // ── Sugerencias ────────────────────────────────────────
        const input = document.getElementById("input-palabra");
        const divSug = document.getElementById("sugerencias");
        let sugActivo = -1;

        input.addEventListener("input", async () => {
            const q = input.value.trim().toLowerCase();
            if (!q) { cerrarSugerencias(); return; }

            const cache = await cacheAll();
            const matches = Object.keys(cache)
                .filter(k => k.startsWith(q) && k !== q)
                .slice(0, 7);

            if (matches.length === 0) { cerrarSugerencias(); return; }

            divSug.innerHTML = matches.map((k, i) => {
                const nivel = cache[k].nivel || "";
                const original = cache[k]._palabra || k;
                return `<div class="sug-item" data-palabra="${original}" data-idx="${i}">
                    <span>${original}</span>
                    ${nivel ? `<span class="sug-nivel">${nivel}</span>` : ""}
                </div>`;
            }).join("");

            divSug.querySelectorAll(".sug-item").forEach(el => {
                el.addEventListener("mousedown", e => {
                    e.preventDefault();
                    seleccionarSugerencia(el.dataset.palabra);
                });
            });

            sugActivo = -1;
            divSug.style.display = "block";
        });

        input.addEventListener("keydown", e => {
            const items = divSug.querySelectorAll(".sug-item");
            if (divSug.style.display === "block" && items.length > 0) {
                if (e.key === "ArrowDown") {
                    e.preventDefault();
                    sugActivo = Math.min(sugActivo + 1, items.length - 1);
                    actualizarActivo(items);
                    return;
                }
                if (e.key === "ArrowUp") {
                    e.preventDefault();
                    sugActivo = Math.max(sugActivo - 1, -1);
                    actualizarActivo(items);
                    return;
                }
                if (e.key === "Enter" && sugActivo >= 0) {
                    seleccionarSugerencia(items[sugActivo].dataset.palabra);
                    return;
                }
            }
            if (e.key === "Escape") cerrarSugerencias();
            if (e.key === "Enter") buscar();
        });

        document.addEventListener("click", e => {
            if (!e.target.closest(".search-wrap")) cerrarSugerencias();
        });

        function actualizarActivo(items) {
            items.forEach((el, i) => el.classList.toggle("activo", i === sugActivo));
        }

        function cerrarSugerencias() {
            divSug.style.display = "none";
            sugActivo = -1;
        }

        function seleccionarSugerencia(palabra) {
            input.value = palabra;
            cerrarSugerencias();
            buscar();
        }

        // ── Búsqueda ───────────────────────────────────────────
        async function buscar() {
            const palabra = input.value.trim();
            if (!palabra) return;
            cerrarSugerencias();

            const btn = document.getElementById("btn-buscar");
            const spinner = document.getElementById("spinner");
            const resultado = document.getElementById("resultado");
            const errorMsg = document.getElementById("error-msg");

            errorMsg.style.display = "none";
            resultado.style.display = "none";

            // 1. IndexedDB local
            const cached = await cacheGet(palabra);
            if (cached) {
                mostrarResultado(cached._palabra || palabra, cached);
                return;
            }

            btn.disabled = true;
            spinner.style.display = "block";

            // 2. Supabase compartida
            const remoto = await supaGet(palabra);
            if (remoto) {
                await cacheSet(palabra, remoto);   // guardar local para próximas veces
                btn.disabled = false;
                spinner.style.display = "none";
                mostrarResultado(remoto.palabra || palabra, remoto);
                return;
            }

            const system = `Eres un diccionario de alemán preciso. El usuario te dará una palabra en alemán.
Responde SIEMPRE con un JSON válido con exactamente estas claves:
{
  "traduccion": "traducción al español",
  "nivel": "A1|A2|B1|B2|C1|C2",
  "definicion": "definición en alemán, clara y concisa",
  "sinonimos": ["palabra1", "palabra2"],
  "antonimo": "antónimo en alemán o null si no tiene"
}
No incluyas nada fuera del JSON.`;

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        system,
                        messages: [{ role: "user", content: palabra }]
                    })
                });

                const data = await res.json();
                if (!res.ok || data.error) throw new Error(data.error || "Error del servidor");

                let info;
                try {
                    const raw = data.reply.replace(/```json|```/g, "").trim();
                    info = JSON.parse(raw);
                } catch {
                    throw new Error("La respuesta no era JSON válido");
                }

                // 3. Guardar en ambos para que otros usuarios también se beneficien
                await Promise.all([cacheSet(palabra, info), supaSet(palabra, info)]);
                mostrarResultado(palabra, info);

            } catch (e) {
                errorMsg.textContent = "Error: " + e.message;
                errorMsg.style.display = "block";
            } finally {
                btn.disabled = false;
                spinner.style.display = "none";
            }
        }

        // ── Render ─────────────────────────────────────────────
        function mostrarResultado(palabra, info) {
            document.getElementById("r-palabra").textContent = palabra;
            document.getElementById("r-nivel").textContent = info.nivel || "";
            document.getElementById("r-traduccion").textContent = info.traduccion || "—";
            document.getElementById("r-definicion").textContent = info.definicion || "—";

            const sinEl = document.getElementById("r-sinonimos");
            const sins = Array.isArray(info.sinonimos) ? info.sinonimos : [];
            sinEl.innerHTML = sins.length > 0
                ? `<div class="chips">${sins.map(s => `<span class="chip">${s}</span>`).join("")}</div>`
                : `<span class="sin-datos">sin sinónimos</span>`;

            const rowAnt = document.getElementById("row-antonimo");
            const antEl = document.getElementById("r-antonimo");
            if (info.antonimo && info.antonimo !== "null") {
                antEl.textContent = info.antonimo;
                rowAnt.style.display = "flex";
            } else {
                rowAnt.style.display = "none";
            }

            document.getElementById("resultado").style.display = "block";
        }
    </script>
</body>
</html>
