    <script>
        /* DATA se carga desde DATA.json */
        let DATA = {};
        

        /* =========================
        ESTADO ÚNICO
        ========================= */
        const State = {
        activeSets: new Set(),           // Set de claves activas (multiselección)
        es: [],
        de: [],
        vistos: [],
        erroresSet: new Set(), // guarda indices con error (para no duplicar)
        modoAuto: true,
        modoDual: false,
        dualFlip: false,
        timerStarted: false,
        timerId: null,
        seconds: 0,
        winnummer: 100,
        currentIndex: null,
        optionIdxs: [],
        modoInverso: false
        };

        /* =========================
        HELPERS / DOM
        ========================= */
        const $ = (id) => document.getElementById(id);

        function safeText(el, txt) {
        if (!el) return;
        el.textContent = txt ?? "";
        }

        function shuffleUniqueIndexes(length, count, forcedIndex = null) {
        const set = new Set();
        while (set.size < count) set.add(Math.floor(Math.random() * length));
        const arr = [...set];

        if (forcedIndex !== null) {
            const pos = Math.floor(Math.random() * count);
            arr[pos] = forcedIndex;
        }
        return arr;
        }

        function nextUnseenIndex() {
        if (!State.de.length) return 0;

        // reset cuando esté casi agotado
        if (State.vistos.length >= State.de.length - 3) State.vistos = [];

        let tries = 0;
        let idx = Math.floor(Math.random() * State.de.length);
        while (State.vistos.includes(idx) && tries < 20) {
            idx = Math.floor(Math.random() * State.de.length);
            tries++;
        }
        State.vistos.push(idx);
        return idx;
        }


        /* =========================
        LISTA (única para ambas)
        ========================= */
        function renderLista(esArr, deArr) {
        const table = $("lista");
        if (!table) return;

        const pairs = [];
        for (let i = 0; i < Math.min(esArr.length, deArr.length); i++) {
            // orden alfabético por alemán
            pairs.push([deArr[i], esArr[i]]);
        }
        pairs.sort((a, b) => String(a[0]).localeCompare(String(b[0])));

        table.innerHTML = `
            <thead>
            <tr><th>alemán</th><th>español</th></tr>
            </thead>
            <tbody>
            ${pairs.map(p => `<tr><td>${escapeHtml(p[0])}</td><td>${escapeHtml(p[1])}</td></tr>`).join("")}
            </tbody>
        `;
        }

        function escapeHtml(s) {
        return String(s)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
        }

        /* =========================
        SELECTOR DE SETS (multiselección)
        ========================= */
        function toggleSet(key) {
        if (!DATA[key]) return;

        // Toggle en el Set
        if (State.activeSets.has(key)) {
            State.activeSets.delete(key);
        } else {
            State.activeSets.add(key);
        }

        // Actualizar UI de botones
        updateSetButtonsUI();

        // Recargar datos combinados
        reloadActiveData();
        syncToCloud();
        }

        function reloadActiveData() {
        // Si no hay sets seleccionados, limpiar
        if (State.activeSets.size === 0) {
            State.es = [];
            State.de = [];
            State.vistos = [];
            State.erroresSet.clear();
            State.currentIndex = null;
            State.optionIdxs = [];

            // Mostrar mensaje de selección requerida
            safeText($("palabra"), "Seleccione al menos una lista");
            safeText($("p1"), "Seleccione al menos una lista");
            safeText($("p2"), "-");

            // Limpiar opciones
            ["op1", "op2", "op3", "op4"].forEach(id => safeText($(id), "-"));

            // Limpiar tabla
            const table = $("lista");
            if (table) {
            table.innerHTML = `
                <thead><tr><th>alemán</th><th>español</th></tr></thead>
                <tbody><tr><td colspan="2" style="text-align:center;color:#999;">Seleccione listas para ver el contenido</td></tr></tbody>
            `;
            }

            // Reset marcadores
            if ($("aciertos")) safeText($("aciertos"), "0");
            if ($("errores")) safeText($("errores"), "0");
            stopTimer();
            State.timerStarted = false;
            State.seconds = 0;
            if ($("tiempo")) safeText($("tiempo"), "00:00");
            return;
        }

        // Combinar todas las listas activas
        const combinedEs = [];
        const combinedDe = [];
        State.activeSets.forEach(k => {
            if (DATA[k]) {
            combinedEs.push(...DATA[k].es);
            combinedDe.push(...DATA[k].de);
            }
        });

        State.es = combinedEs;
        State.de = combinedDe;

        // reset de estado de juego
        State.vistos = [];
        State.erroresSet.clear();
        State.currentIndex = null;
        State.optionIdxs = [];

        // reset marcadores
        if ($("aciertos")) safeText($("aciertos"), "0");
        if ($("errores")) safeText($("errores"), "0");

        // timer
        stopTimer();
        State.timerStarted = false;
        State.seconds = 0;
        if ($("tiempo")) safeText($("tiempo"), "00:00");

        // render tabla
        renderLista(State.es, State.de);

        // pintar primera palabra para repetición
        renderRepeatNext();

        // pintar primera ronda de selección
        renderSelectionNext();
        }

        function updateSetButtonsUI() {
        const bar = $("sets-bar");
        if (!bar) return;

        const buttons = bar.querySelectorAll("button");
        buttons.forEach(btn => {
            const key = btn.textContent;
            if (State.activeSets.has(key)) {
            btn.classList.add("btn-active");
            } else {
            btn.classList.remove("btn-active");
            }
        });
        }

        // Función legacy para compatibilidad (ahora llama a toggleSet)
        function setActiveSet(key) {
        toggleSet(key);
        }

        /* =========================
        BOTONES DE SETS (multiselección)
        ========================= */
        function mountSetButtons() {
        const app = document.querySelector(".app");
        if (!app) return;

        // Crear contenedor para la barra de selección con descripción
        let container = document.getElementById("sets-container");
        if (!container) {
            container = document.createElement("div");
            container.id = "sets-container";
            container.style.marginBottom = "20px";

            // Descripción
            const desc = document.createElement("div");
            desc.className = "lista-info";
            desc.innerHTML = "<strong>Seleccione una o más listas:</strong> Los botones en rojo indican listas activas";
            container.appendChild(desc);

            // Barra de botones
            let bar = document.createElement("div");
            bar.id = "sets-bar";
            bar.className = "panel";
            container.appendChild(bar);

            app.prepend(container);
        }

        const bar = $("sets-bar");
        bar.innerHTML = "";
        Object.keys(DATA).forEach((k) => {
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.textContent = k;
            if (k.startsWith('mis: ')) {
                btn.style.borderStyle = 'dashed';
                btn.title = 'Lista personal';
            }
            btn.addEventListener("click", () => toggleSet(k));
            bar.appendChild(btn);
        });

        // Actualizar UI según estado actual
        updateSetButtonsUI();
        }

        /* =========================
 /* =========================
   SELECCIÓN MÚLTIPLE (versión estable sin helpers externos)
   ========================= */

/* Asegúrate de que estas propiedades existan en State */
State.selectionLock = false;
State.roundToken = 0;

function renderSelectionNext() {
  if (!State.es.length || !State.de.length) {
    safeText($("palabra"), "Seleccione al menos una lista");
    ["op1", "op2", "op3", "op4"].forEach(id => safeText($(id), "-"));
    return;
  }

  State.selectionLock = false;
  State.roundToken++;

  const idx = nextUnseenIndex();
  State.currentIndex = idx;

  State.optionIdxs = shuffleUniqueIndexes(State.de.length, 4, idx);

  safeText($("palabra"), State.modoInverso ? State.de[idx] : State.es[idx]);

  const ids = ["op1", "op2", "op3", "op4"];
  ids.forEach((id, slot) => {
    const el = $(id);
    if (!el) return;

    const wordIndex = State.optionIdxs[slot];

    el.textContent = State.modoInverso ? State.es[wordIndex] : State.de[wordIndex];
    el.dataset.wordIndex = String(wordIndex);
    el.dataset.roundToken = String(State.roundToken);
  });
}

function markOptionsBackground(color) {
  const cont =
    document.getElementById("opciones") ||
    document.querySelector("#seleccion-multiple .options-grid") ||
    document.querySelector(".options-grid");

  if (!cont) return;

  cont.style.background = color;
  setTimeout(() => (cont.style.background = ""), 200);
}

function handleSelectionPick(chosenWordIndex, token) {
  if (State.currentIndex === null) return;

  // Evita doble conteo
  if (State.selectionLock) return;
  if (String(token) !== String(State.roundToken)) return;

  State.selectionLock = true;

  // NO modificar lógica del timer
  if (!State.timerStarted) startTimer();

  const correct = chosenWordIndex === State.currentIndex;

  if (correct) {
    markOptionsBackground("green");

    const acEl = $("aciertos");
    if (acEl) {
      acEl.textContent = String(
        parseInt(acEl.textContent || "0", 10) + 1
      );
    }
  } else {
    markOptionsBackground("red");

    if (!State.erroresSet.has(State.currentIndex)) {
      State.erroresSet.add(State.currentIndex);

      const erEl = $("errores");
      if (erEl) {
        erEl.textContent = String(
          parseInt(erEl.textContent || "0", 10) + 1
        );
      }
    }
  }

  renderSelectionNext();
}

function bindSelectionEvents() {
  const cont =
    document.getElementById("opciones") ||
    document.querySelector("#seleccion-multiple .options-grid") ||
    document.querySelector(".options-grid");

  if (!cont) return;

  if (cont.dataset.bound === "1") return;
  cont.dataset.bound = "1";

  cont.addEventListener("click", (e) => {
    const opt = e.target.closest("#op1,#op2,#op3,#op4,.option");
    if (!opt) return;

    const chosen = parseInt(opt.dataset.wordIndex, 10);
    const token = opt.dataset.roundToken;

    if (Number.isNaN(chosen)) return;

    handleSelectionPick(chosen, token);
  });
}

        /* =========================
        TIMER (para selección)
        ========================= */
        function startTimer() {
        if (State.timerId) return;

        State.timerStarted = true;
        State.timerId = setInterval(() => {
            const ac = parseInt(($("aciertos")?.textContent || "0"), 10);
            if (ac >= State.winnummer) {
            stopTimer();
            return;
            }

            State.seconds++;
            const m = Math.floor(State.seconds / 60);
            const s = State.seconds % 60;
            safeText($("tiempo"), String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0"));
        }, 1000);
        }

        function stopTimer() {
        if (State.timerId) clearInterval(State.timerId);
        State.timerId = null;
        }

        /* Llama esto en tu init (o reemplaza la llamada anterior) */
        bindSelectionEvents();
        renderSelectionNext();







        /* =========================
        REPETICIÓN (speech)
        ========================= */
        function renderRepeatNext() {
        if (!State.es.length || !State.de.length) {
            safeText($("p1"), "Seleccione al menos una lista");
            safeText($("p2"), "-");
            return;
        }

        const idx = nextUnseenIndex();
        safeText($("p1"), State.es[idx]);
        safeText($("p2"), State.de[idx]);
        }

        function speakOnce(text, lang) {
        if (!text) return Promise.resolve();
        return new Promise((resolve) => {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = lang;
            u.onend = resolve;
            u.onerror = resolve;
            speechSynthesis.speak(u);
        });
        }

        async function speakLoop() {
        // si auto está apagado, hace solo un disparo
        if (!State.modoAuto) {
            await speakOnce($("p2")?.textContent || "", "de");
            return;
        }

        // en auto: sigue leyendo continuamente
        while (State.modoAuto) {
            // dual alterna DE/ES; si no, solo DE
            if (!State.modoDual) {
            await speakOnce($("p2")?.textContent || "", "de");
            await wait(500);
            renderRepeatNext();
            continue;
            }

            // dual: alternar ES/DE
            if (!State.dualFlip) {
            await speakOnce($("p1")?.textContent || "", "es");
            State.dualFlip = true;
            } else {
            await speakOnce($("p2")?.textContent || "", "de");
            State.dualFlip = false;
            await wait(500);
            renderRepeatNext();
            }

            await wait(300);
        }
        }

        function wait(ms) {
        return new Promise((r) => setTimeout(r, ms));
        }

        /* =========  WAKE LOCK  ========= */
        let wakeLock = null;

        async function requestWakeLock() {
        if (!("wakeLock" in navigator)) return;
        try {
            wakeLock = await navigator.wakeLock.request("screen");
        } catch (e) {
            // el sistema puede denegar el lock (batería baja, etc.)
        }
        }

        function releaseWakeLock() {
        if (wakeLock) {
            wakeLock.release();
            wakeLock = null;
        }
        }

        // Si el lock se pierde (ej. el usuario cambia de pestaña y vuelve),
        // se reactiva automáticamente cuando la página es visible de nuevo.
        document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible" && State.modoAuto && !wakeLock) {
            requestWakeLock();
        }
        });

        /* Controles repetición */
        function bindRepeatControls() {
        const btnAuto = $("auto");
        const btnDual = $("dual");
        const btnLeer = $("leer");

        if (btnAuto) {
            btnAuto.addEventListener("click", () => {
            State.modoAuto = !State.modoAuto;
            btnAuto.textContent = State.modoAuto ? "Auto: ON" : "Auto: OFF";
            btnAuto.className = State.modoAuto ? "btn btn-secondary" : "btn btn-danger";
            if (State.modoAuto) {
                requestWakeLock();
            } else {
                releaseWakeLock();
            }
            });
        }

        if (btnDual) {
            btnDual.addEventListener("click", () => {
            State.modoDual = !State.modoDual;
            State.dualFlip = false;
            btnDual.textContent = State.modoDual ? "ES-DE" : "DE";
            btnDual.className = State.modoDual ? "btn btn-secondary" : "btn btn-danger";
            });
        }

        if (btnLeer) {
            btnLeer.addEventListener("click", async () => {
            // si ya está hablando, cortar
            if (speechSynthesis.speaking) speechSynthesis.cancel();

            // inicia lectura; si auto=true entra en loop
            if (State.modoAuto) {
                requestWakeLock();
                speakLoop();
            } else {
                // one-shot
                if (State.modoDual) {
                await speakOnce($("p2")?.textContent || "", "de");
                await speakOnce($("p1")?.textContent || "", "es");
                } else {
                await speakOnce($("p2")?.textContent || "", "de");
                }
            }
            });
        }
        }

        /* =========================
        UTILIDADES
        ========================= */
        function showToast(msg) {
            const div = document.createElement('div');
            div.textContent = msg;
            Object.assign(div.style, {
                fontSize: '18px', position: 'fixed', top: '50%', left: '50%',
                transform: 'translate(-50%, -50%)', backgroundColor: 'rgba(0,0,0,0.82)',
                color: 'white', padding: '24px 40px', borderRadius: '8px', zIndex: '1000',
                textAlign: 'center', maxWidth: '80vw'
            });
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1500);
        }

        function copiarErrores() {
            if (State.erroresSet.size === 0) {
                showToast('Sin errores en esta sesión');
                return;
            }
            const lines = [...State.erroresSet]
                .map(i => `${State.es[i]} — ${State.de[i]}`)
                .join('\n');
            navigator.clipboard.writeText(lines)
                .then(() => showToast(`✓ ${State.erroresSet.size} errores copiados`))
                .catch(() => showToast('No se pudo acceder al portapapeles'));
        }

        /* =========================
           LISTAS PERSONALES (IndexedDB)
           ========================= */
        const LP_DB = 'listas-personales';
        const LP_STORE = 'listas';
        let _lpDb = null;

        function abrirDBListasP() {
            if (_lpDb) return Promise.resolve(_lpDb);
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(LP_DB, 1);
                req.onupgradeneeded = e => {
                    e.target.result.createObjectStore(LP_STORE, { keyPath: 'id' });
                };
                req.onsuccess = e => { _lpDb = e.target.result; resolve(_lpDb); };
                req.onerror = () => reject(req.error);
            });
        }

        async function guardarListaP(lista) {
            const db = await abrirDBListasP();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(LP_STORE, 'readwrite');
                tx.objectStore(LP_STORE).put(lista);
                tx.oncomplete = resolve;
                tx.onerror = () => reject(tx.error);
            });
        }

        async function cargarListasP() {
            try {
                const db = await abrirDBListasP();
                return new Promise(resolve => {
                    const req = db.transaction(LP_STORE).objectStore(LP_STORE).getAll();
                    req.onsuccess = () => resolve(req.result || []);
                    req.onerror = () => resolve([]);
                });
            } catch { return []; }
        }

        async function eliminarListaP(id) {
            const db = await abrirDBListasP();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(LP_STORE, 'readwrite');
                tx.objectStore(LP_STORE).delete(id);
                tx.oncomplete = resolve;
                tx.onerror = () => reject(tx.error);
            });
        }

        function parsearPalabras(str) {
            return str.split(',').map(w => w.trim()).filter(w => w.length > 0);
        }

        async function traducirPalabra(palabra, sourceLang, targetLang) {
            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(palabra)}&langpair=${sourceLang}|${targetLang}`;
                const r = await fetch(url);
                const json = await r.json();
                return json.responseData?.translatedText || palabra;
            } catch { return palabra; }
        }

        async function inyectarListasPersonales() {
            const listas = await cargarListasP();
            listas.forEach(l => {
                DATA['mis: ' + l.nombre] = { es: l.es, de: l.de };
            });
        }

        async function guardarNuevaLista() {
            const nombre = document.getElementById('lp-nombre').value.trim();
            const esRaw  = document.getElementById('lp-es').value.trim();
            const deRaw  = document.getElementById('lp-de').value.trim();
            const status = document.getElementById('lp-status');

            if (!nombre) { status.textContent = 'Escribe un nombre para la lista.'; return; }
            if (!esRaw && !deRaw) { status.textContent = 'Escribe al menos una columna de palabras.'; return; }

            const btnGuardar = document.getElementById('lp-guardar');
            btnGuardar.disabled = true;
            status.textContent = '';

            let esArr = esRaw ? parsearPalabras(esRaw) : [];
            let deArr = deRaw ? parsearPalabras(deRaw) : [];

            if (esArr.length > 0 && deArr.length === 0) {
                for (let i = 0; i < esArr.length; i++) {
                    status.textContent = `Traduciendo ES→DE ${i + 1}/${esArr.length}...`;
                    deArr.push(await traducirPalabra(esArr[i], 'es', 'de'));
                }
            } else if (deArr.length > 0 && esArr.length === 0) {
                for (let i = 0; i < deArr.length; i++) {
                    status.textContent = `Traduciendo DE→ES ${i + 1}/${deArr.length}...`;
                    esArr.push(await traducirPalabra(deArr[i], 'de', 'es'));
                }
            } else if (esArr.length !== deArr.length) {
                status.textContent = `Diferente cantidad de palabras (${esArr.length} ES vs ${deArr.length} DE).`;
                btnGuardar.disabled = false;
                return;
            }

            const lista = { id: Date.now(), nombre, es: esArr, de: deArr };
            await guardarListaP(lista);

            DATA['mis: ' + nombre] = { es: esArr, de: deArr };
            mountSetButtons();

            document.getElementById('lp-nombre').value = '';
            document.getElementById('lp-es').value = '';
            document.getElementById('lp-de').value = '';
            status.textContent = `"${nombre}" guardada — ${esArr.length} palabras.`;
            btnGuardar.disabled = false;
            refreshMisListas();
        }

        async function refreshMisListas() {
            const container = document.getElementById('lp-lista-guardadas');
            if (!container) return;
            const listas = await cargarListasP();
            if (listas.length === 0) {
                container.innerHTML = '<em style="color:#999;font-size:13px;">No hay listas guardadas.</em>';
                return;
            }
            container.innerHTML = '';
            listas.forEach(l => {
                const row = document.createElement('div');
                row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:6px;';
                const btnCopiar = document.createElement('button');
                btnCopiar.textContent = 'Copiar';
                btnCopiar.style.cssText = 'padding:3px 9px;border:1px solid #888;color:#555;background:none;border-radius:5px;cursor:pointer;font-size:12px;';
                btnCopiar.addEventListener('click', () => {
                    const texto = `${l.nombre} (${l.es.length} palabras)\nES: ${l.es.join(', ')}\nDE: ${l.de.join(', ')}`;
                    navigator.clipboard.writeText(texto)
                        .then(() => { btnCopiar.textContent = '✓ Copiado'; setTimeout(() => { btnCopiar.textContent = 'Copiar'; }, 1500); })
                        .catch(() => showToast('No se pudo acceder al portapapeles'));
                });
                const btnEliminar = document.createElement('button');
                btnEliminar.textContent = 'Eliminar';
                btnEliminar.style.cssText = 'padding:3px 9px;border:1px solid #e53935;color:#e53935;background:none;border-radius:5px;cursor:pointer;font-size:12px;';
                btnEliminar.addEventListener('click', () => eliminarListaPersonal(l.id));
                const label = document.createElement('span');
                label.style.cssText = 'flex:1;font-size:14px;';
                label.innerHTML = `<strong>${l.nombre}</strong> <span style="color:#999">(${l.es.length} palabras)</span>`;
                row.appendChild(label);
                row.appendChild(btnCopiar);
                row.appendChild(btnEliminar);
                container.appendChild(row);
            });
        }

        async function eliminarListaPersonal(id) {
            const listas = await cargarListasP();
            const lista = listas.find(l => l.id === id);
            if (lista) {
                const clave = 'mis: ' + lista.nombre;
                State.activeSets.delete(clave);
                delete DATA[clave];
            }
            await eliminarListaP(id);
            mountSetButtons();
            reloadActiveData();
            refreshMisListas();
            showToast('Lista eliminada');
        }

        function montarPanelMisListas() {
            if (document.getElementById('mis-listas-panel')) { refreshMisListas(); return; }
            const app = document.querySelector('.app');
            if (!app) return;
            const panel = document.createElement('div');
            panel.id = 'mis-listas-panel';
            panel.style.cssText = 'margin-bottom:20px;';
            panel.innerHTML = `
                <div style="cursor:pointer;padding:8px 12px;border:1px solid #ccc;border-radius:8px;font-size:14px;display:flex;align-items:center;justify-content:space-between;user-select:none;" id="lp-toggle">
                    <strong>+ Mis Listas</strong><span id="lp-arrow">▶</span>
                </div>
                <div id="lp-body" style="display:none;padding:12px;border:1px solid #ccc;border-top:none;border-radius:0 0 8px 8px;">
                    <input id="lp-nombre" type="text" placeholder="Nombre de la lista" style="width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:6px;margin-bottom:8px;box-sizing:border-box;font-size:14px;">
                    <input id="lp-es" type="text" placeholder="Español: hola, gracias, casa, ..." style="width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:6px;margin-bottom:8px;box-sizing:border-box;font-size:14px;">
                    <input id="lp-de" type="text" placeholder="Alemán: Hallo, danke, Haus, ... (opcional, se auto-traduce)" style="width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:6px;margin-bottom:8px;box-sizing:border-box;font-size:14px;">
                    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                        <button id="lp-guardar" onclick="guardarNuevaLista()" style="padding:7px 18px;background:#1976D2;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">Guardar lista</button>
                        <span id="lp-status" style="font-size:13px;color:#555;"></span>
                    </div>
                    <hr style="border:none;border-top:1px solid #eee;margin:12px 0;">
                    <div id="lp-lista-guardadas"><em style="color:#999;font-size:13px;">Cargando...</em></div>
                </div>
            `;
            panel.querySelector('#lp-toggle').addEventListener('click', () => {
                const body = document.getElementById('lp-body');
                const arrow = document.getElementById('lp-arrow');
                const open = body.style.display === 'none';
                body.style.display = open ? 'block' : 'none';
                arrow.textContent = open ? '▼' : '▶';
            });
            const setsContainer = document.getElementById('sets-container');
            if (setsContainer) {
                setsContainer.insertAdjacentElement('afterend', panel);
            } else {
                app.prepend(panel);
            }
            refreshMisListas();
        }

        /* =========================
        INIT
        ========================= */
        async function initUnifiedApp() {
        await inyectarListasPersonales();
        mountSetButtons();
        montarPanelMisListas();
        bindSelectionEvents();
        bindRepeatControls();

        // Estado inicial: ninguna lista seleccionada
        // Mostrar mensaje inicial
        safeText($("palabra"), "Seleccione al menos una lista");
        safeText($("p1"), "Seleccione al menos una lista");
        safeText($("p2"), "-");
        ["op1", "op2", "op3", "op4"].forEach(id => safeText($(id), "-"));

        const table = $("lista");
        if (table) {
            table.innerHTML = `
            <thead><tr><th>alemán</th><th>español</th></tr></thead>
            <tbody><tr><td colspan="2" style="text-align:center;color:#999;padding:20px;">Seleccione listas para ver el contenido</td></tr></tbody>
            `;
        }
        }

        function toggleModoInverso() {
        State.modoInverso = !State.modoInverso;
        const btn = $("btn-inverso");
        if (btn) btn.textContent = State.modoInverso ? "DE → ES" : "ES → DE";
        renderSelectionNext();
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            document.getElementById('darkModeBtn').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('darkMode_b2', isDark);
            syncToCloud();
        }
        if (localStorage.getItem('darkMode_b2') === 'true') {
            document.body.classList.add('dark');
            document.getElementById('darkModeBtn').textContent = '☀️';
        }

        document.addEventListener("keydown", function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        const map = { '1': 'op1', '2': 'op2', '3': 'op3', '4': 'op4' };
        if (map[e.key]) {
            const el = $(map[e.key]);
            if (!el || el.textContent === '-' || !el.dataset.wordIndex) return;
            const chosen = parseInt(el.dataset.wordIndex, 10);
            handleSelectionPick(chosen, el.dataset.roundToken);
        }
        });

        document.addEventListener("DOMContentLoaded", () => {
            fetch("DATA.json")
                .then(r => r.json())
                .then(json => { DATA = json; initUnifiedApp(); })
                .catch(() => { document.body.innerHTML = "<p style='padding:2rem'>Error cargando DATA.json</p>"; });
        });

        // Registro del Service Worker (PWA offline) + recordatorio periódico
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/sw.js").then(async (reg) => {
                // Marcar uso de hoy en IndexedDB para que el SW no notifique si se usó
                marcarUsoHoy("b2");

                if (!("periodicSync" in reg)) return;
                const perm = await Notification.requestPermission();
                if (perm !== "granted") return;
                try {
                    // minInterval 1h: el browser tiene ventanas frecuentes para verificar las 18:00
                    await reg.periodicSync.register("recordatorio-aleman-b2", {
                        minInterval: 60 * 60 * 1000
                    });
                } catch (_) { /* navegador no soporta periodicSync */ }
            });
        }

        function marcarUsoHoy(appKey) {
            const req = indexedDB.open("sw-usage", 1);
            req.onupgradeneeded = (e) => {
                e.target.result.createObjectStore("meta", { keyPath: "key" });
            };
            req.onsuccess = (e) => {
                const tx = e.target.result.transaction("meta", "readwrite");
                tx.objectStore("meta").put({ key: "lastUsed-" + appKey, value: new Date().toDateString() });
            };
        }

        /* ========================= AUTH ========================= */
        const SUPA_URL = 'https://mzitpnacjcjpokmiqwtd.supabase.co';
        const SUPA_KEY = 'sb_publishable_y9CSkHLB2haNPnzvP0-RUQ_OF5h3t4I';
        const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
        let currentUser = null;
        let _otpEmail = '';

        function openAuthModal() {
            document.getElementById('auth-modal').style.display = 'flex';
            document.getElementById('auth-email-step').style.display = 'block';
            document.getElementById('auth-otp-step').style.display = 'none';
            document.getElementById('auth-email').value = '';
        }
        function closeAuthModal() {
            document.getElementById('auth-modal').style.display = 'none';
        }
        async function sendOtp() {
            const email = document.getElementById('auth-email').value.trim();
            if (!email) return;
            const btn = document.getElementById('auth-send-btn');
            btn.disabled = true; btn.textContent = 'Enviando...';
            const { error } = await sb.auth.signInWithOtp({ email });
            btn.disabled = false; btn.textContent = 'Enviar código';
            if (error) { alert('Error: ' + error.message); return; }
            _otpEmail = email;
            document.getElementById('auth-email-step').style.display = 'none';
            document.getElementById('auth-otp-step').style.display = 'block';
            document.getElementById('auth-otp-label').textContent = `Código enviado a ${email}`;
            document.getElementById('auth-otp').value = '';
            document.getElementById('auth-otp').focus();
        }
        async function verifyOtp() {
            const token = document.getElementById('auth-otp').value.trim();
            if (!token) return;
            const btn = document.getElementById('auth-verify-btn');
            btn.disabled = true; btn.textContent = 'Verificando...';
            const { error } = await sb.auth.verifyOtp({ email: _otpEmail, token, type: 'email' });
            btn.disabled = false; btn.textContent = 'Verificar';
            if (error) { alert('Código incorrecto o expirado'); return; }
            closeAuthModal();
        }
        async function logout() {
            await sb.auth.signOut();
        }
        function updateAuthUI() {
            const btn = document.getElementById('auth-btn');
            if (currentUser) {
                btn.textContent = currentUser.email.split('@')[0];
                btn.title = 'Cerrar sesión';
                btn.onclick = logout;
            } else {
                btn.textContent = '👤';
                btn.title = 'Iniciar sesión';
                btn.onclick = openAuthModal;
            }
        }
        async function onSignedIn() {
            const { data } = await sb.from('user_data').select('*').eq('user_id', currentUser.id).maybeSingle();
            if (!data) return;
            if (data.b2_active_sets?.length) {
                State.activeSets.clear();
                data.b2_active_sets.forEach(k => { if (DATA[k]) State.activeSets.add(k); });
                updateSetButtonsUI();
                reloadActiveData();
            }
            if (data.b2_dark != null) {
                document.body.classList.toggle('dark', data.b2_dark);
                document.getElementById('darkModeBtn').textContent = data.b2_dark ? '☀️' : '🌙';
                localStorage.setItem('darkMode_b2', data.b2_dark);
            }
        }
        async function syncToCloud() {
            if (!currentUser) return;
            await sb.from('user_data').upsert({
                user_id: currentUser.id,
                b2_active_sets: [...State.activeSets],
                b2_dark: document.body.classList.contains('dark'),
                updated_at: new Date().toISOString()
            }, { onConflict: 'user_id' });
        }
        sb.auth.onAuthStateChange(async (event, session) => {
            currentUser = session?.user || null;
            updateAuthUI();
            if (event === 'SIGNED_IN') await onSignedIn();
        });
        sb.auth.getSession().then(({ data: { session } }) => {
            currentUser = session?.user || null;
            updateAuthUI();
            if (currentUser) onSignedIn();
        });
        </script>
