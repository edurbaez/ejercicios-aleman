<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #1d1c1c20;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========= CONTENEDOR PRINCIPAL ========= */

        .app {
            width: 90%;
            max-width: 1000px;
            margin: 20px auto;
        }

        /* ========= HEADER ========= */

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .title {
            font-size: 1.8rem;
        }

        /* ========= PANEL DE ESTADÍSTICAS ========= */

        .panel {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 10px;
        }

        .card {
            flex: 1;
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: rgba(255, 0, 0, 0.2) -1px 4px 5px;
        }

        /* ========= PALABRA ========= */

        .word-display {
            text-align: center;
            padding: 20px;
            background: #1d1c1c30;
            font-size: 1.5rem;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* ========= OPCIONES ========= */

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .option {
            padding: 20px;
            text-align: center;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: rgba(255, 0, 0, 0.2) -1px 4px 5px;
            transition: 0.2s;
        }

        .option:hover {
            background: #f2f2f2;
        }

        /* ========= BOTONES ========= */

        .btn {
            padding: 12px;
            border: 3px solid #173819;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: red;
        }

        .btn-danger {
            background-color: red;
        }

        .btn-secondary {
            background-color: green;
        }

        /* Barra de botones (sets-bar): scroll horizontal fino */
        #sets-bar{
        display: flex;
        gap: 10px;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
        padding: 10px 0;
        }

        /* Scrollbar fino */
        #sets-bar::-webkit-scrollbar{
        height: 6px;
        }
        #sets-bar::-webkit-scrollbar-track{
        background: transparent;
        }
        #sets-bar::-webkit-scrollbar-thumb{
        background: rgba(0,0,0,0.25);
        border-radius: 999px;
        }
        #sets-bar::-webkit-scrollbar-thumb:hover{
        background: rgba(0,0,0,0.4);
        }

        /* Firefox */
        #sets-bar{
        scrollbar-width: thin;
        scrollbar-color: rgba(0,0,0,0.25) transparent;
        }

        /* Evita que los botones se encojan */
        #sets-bar .btn{
        flex: 0 0 auto;
        }

        /* ========= FOOTER CONTROLES ========= */

        .footer-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        /* ========= TABLA ========= */

        .table-container {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 2px solid grey;
            padding: 8px;
            text-align: center;
        }
    </style>
</head>

        /* ========================= STATE ========================= */
        const State = {
        setKey: "",
        es: [], de: [],
        vistos: [],
        erroresSet: new Set(),
        aciertos: 0,
        errores: 0,
        modoAuto: true,
        modoDual: false,
        dualFlip: false,
        timerStarted: false,
        timerId: null,
        seconds: 0,
        currentIndex: null,
        optionIdxs: [],
        selectionLock: false,
        roundToken: 0,
        };

        /* ========================= HELPERS ========================= */
        const $ = (id) => document.getElementById(id);
        const safeText = (el, txt) => { if (el) el.textContent = txt ?? ""; };
        const wait = (ms) => new Promise((r) => setTimeout(r, ms));

        // Pone aciertos y errores a 0 en State y en el DOM.
        function resetCounters() {
        State.aciertos = 0; State.errores = 0;
        safeText($("aciertos"), "0"); safeText($("errores"), "0");
        }

        // Suma 1 al contador indicado ("aciertos" o "errores") en State y actualiza el DOM.
        function incrementCounter(id) {
        State[id]++;
        safeText($(id), String(State[id]));
        }

        // Detiene el intervalo, reinicia segundos a 0 y muestra "00:00".
        function resetTimer() {
        stopTimer();
        State.timerStarted = false; State.seconds = 0;
        safeText($("tiempo"), "00:00");
        }

        // Devuelve un array de `count` índices únicos que siempre incluye `forcedIndex`.
        // Construye un Set partiendo de forcedIndex y lo mezcla con Fisher-Yates.
        function shuffleUniqueIndexes(length, count, forcedIndex) {
        const set = new Set([forcedIndex]);
        while (set.size < count) set.add(Math.floor(Math.random() * length));
        const arr = [...set];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
        }

        // Elige un índice aleatorio que no haya salido recientemente (lista "vistos").
        // Reinicia "vistos" cuando quedan menos de 3 palabras sin ver.
        function nextUnseenIndex() {
        if (!State.de.length) return 0;
        if (State.vistos.length >= State.de.length - 3) State.vistos = [];
        let idx, tries = 0;
        do {
            idx = Math.floor(Math.random() * State.de.length);
            tries++;
        } while (State.vistos.includes(idx) && tries < 20);
        State.vistos.push(idx);
        return idx;
        }


        /* =========================

        ========================= */
        // Rellena la tabla #lista con los pares DE/ES ordenados alfabéticamente por alemán.
        // Escapa HTML de cada celda para evitar inyección de etiquetas.
        function renderLista(esArr, deArr) {
        const table = $("lista");
        if (!table) return;

        const pairs = [];
        for (let i = 0; i < Math.min(esArr.length, deArr.length); i++) {
            // orden alfabético por alemán
            pairs.push([deArr[i], esArr[i]]);
        }
        pairs.sort((a, b) => String(a[0]).localeCompare(String(b[0])));

        table.innerHTML = `
            <thead>
            <tr><th>alemán</th><th>español</th></tr>
            </thead>
            <tbody>
            ${pairs.map(p => `<tr><td>${escapeHtml(p[0])}</td><td>${escapeHtml(p[1])}</td></tr>`).join("")}
            </tbody>
        `;
        }

        // Convierte caracteres especiales HTML en entidades para mostrarlos como texto plano.
        function escapeHtml(s) {
        return String(s)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
        }

        /* =========================
        SELECTOR DE BASE (único)
        ========================= */
        // Carga el set de palabras indicado por key, reinicia estado y renderiza todas las vistas.
        // Limpia vistos, errores y contadores, luego muestra lista, repetición y selección.
        function setActiveSet(key) {
        if (!DATA[key]) return;

        State.setKey = key;
        State.es = [...DATA[key].es];
        State.de = [...DATA[key].de];

        State.vistos = [];
        State.erroresSet.clear();
        State.currentIndex = null;
        State.optionIdxs = [];

        resetCounters();
        resetTimer();
        renderLista(State.es, State.de);
        renderRepeatNext();
        renderSelectionNext();
        }

        /* =========================

        ========================= */
        // Crea botones dinámicos para cada lista en DATA y los añade al panel superior.
        // Cada botón al hacer click carga su respectivo set de palabras.
        function mountSetButtons() {
        const app = document.querySelector(".app");
        if (!app) return;

        let bar = $("sets-bar");
        if (!bar) {
            bar = document.createElement("div");
            bar.id = "sets-bar";
            bar.className = "panel";
            bar.style.marginBottom = "20px";
            app.prepend(bar);
        }

        bar.innerHTML = "";
        Object.keys(DATA).forEach((k) => {
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.textContent = k;
            btn.addEventListener("click", () => setActiveSet(k));
            bar.appendChild(btn);
        });
        }

        /* ========================= SELECCIÓN MÚLTIPLE ========================= */
        // Muestra la siguiente palabra española y 4 opciones en alemán (1 correcta + 3 aleatorias).
        // Usa nextUnseenIndex para evitar repeticiones recientes y mezcla las opciones.
        function renderSelectionNext() {
        if (!State.es.length) return;
        State.selectionLock = false;
        State.roundToken++;
        const idx = nextUnseenIndex();
        State.currentIndex = idx;
        State.optionIdxs = shuffleUniqueIndexes(State.de.length, 4, idx);
        safeText($("palabra"), State.es[idx]);
        ["op1","op2","op3","op4"].forEach((id, slot) => {
            const el = $(id);
            if (!el) return;
            el.textContent = State.de[State.optionIdxs[slot]];
            el.dataset.wordIndex = String(State.optionIdxs[slot]);
            el.dataset.roundToken = String(State.roundToken);
        });
        }

        // Cambia temporalmente el fondo del grid de opciones al color indicado (feedback visual).
        // Se usa verde para acierto y rojo para error; dura 200ms.
        function flashGrid(color) {
        const grid = document.querySelector(".options-grid");
        if (!grid) return;
        grid.style.background = color;
        setTimeout(() => (grid.style.background = ""), 200);
        }

        // Procesa la opción elegida por el usuario: compara índices y actualiza contadores.
        // Inicia el timer en la primera respuesta; flash verde/rojo da feedback visual inmediato.
        function handleSelectionPick(chosenIdx, token) {
        if (State.currentIndex === null || State.selectionLock) return;
        if (String(token) !== String(State.roundToken)) return;
        State.selectionLock = true;
        if (!State.timerStarted) startTimer();
        if (chosenIdx === State.currentIndex) {
            flashGrid("green");
            incrementCounter("aciertos");
        } else {
            flashGrid("red");

            State.erroresSet.add(State.currentIndex);
            incrementCounter("errores");
            }
        }
        renderSelectionNext();
        }

        // Vincula el evento click al grid de opciones para capturar la selección del usuario.
        // Usa dataset.bound para evitar registrar múltiples listeners en la misma cuadrícula.
        function bindSelectionEvents() {
        const grid = document.querySelector(".options-grid");
        if (!grid || grid.dataset.bound === "1") return;
        grid.dataset.bound = "1";
        grid.addEventListener("click", (e) => {
            const opt = e.target.closest(".option");
            if (!opt) return;
            const chosen = parseInt(opt.dataset.wordIndex, 10);
            if (Number.isNaN(chosen)) return;
            handleSelectionPick(chosen, opt.dataset.roundToken);
        });
        }

        /* ========================= TIMER ========================= */
        // Inicia un intervalo que incrementa los segundos y actualiza el display cada segundo.
        // Se detiene automáticamente cuando se alcanzan 50 aciertos.
        function startTimer() {
        if (State.timerId) return;
        State.timerStarted = true;
        State.timerId = setInterval(() => {
            if (State.aciertos >= 50) { stopTimer(); return; }
            State.seconds++;
            const m = Math.floor(State.seconds / 60);
            const s = State.seconds % 60;
            safeText($("tiempo"), String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0"));
        }, 1000);
        }

        // Detiene el intervalo del timer y limpia la referencia para permitir reinicio limpio.
        function stopTimer() {
        clearInterval(State.timerId);
        State.timerId = null;
        }

        /* ========================= REPETICIÓN (speech) ========================= */
        // Muestra el siguiente par de palabras español-alemán en las etiquetas p1 y p2.
        // Usa nextUnseenIndex para evitar repeticiones consecutivas.
        function renderRepeatNext() {
        if (!State.es.length) return;
        const idx = nextUnseenIndex();
        safeText($("p1"), State.es[idx]);
        safeText($("p2"), State.de[idx]);
        }

        // Utiliza la Web Speech API para leer el texto en el idioma indicado una sola vez.
        // Devuelve una Promise que se resuelve al terminar o si ocurre un error.
        function speakOnce(text, lang) {
        if (!text) return Promise.resolve();
        return new Promise((resolve) => {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = lang;
            u.onend = u.onerror = resolve;
            speechSynthesis.speak(u);
        });
        }

        // Bucle async que lee palabras automáticamente mientras modoAuto esté activo.
        // Lee alemán (y español si modoDual está ON), espera y avanza a la siguiente palabra.
        async function speakLoop() {
        while (State.modoAuto) {
            await speakOnce($("p2")?.textContent || "", "de");
            if (State.modoDual) await speakOnce($("p1")?.textContent || "", "es");
            await wait(500);
            renderRepeatNext();
            await wait(300);
        }
        }

        // Vincula eventos a los botones Auto, Dual y Leer para controlar el modo repetición.
        // Alterna los estados modoAuto/modoDual y gestiona la reproducción de voz.
        function bindRepeatControls() {
        $("auto")?.addEventListener("click", () => {
            State.modoAuto = !State.modoAuto;
            $("auto").textContent = State.modoAuto ? "Auto: ON" : "Auto: OFF";
            $("auto").className = State.modoAuto ? "btn btn-secondary" : "btn btn-danger";
        });
        $("dual")?.addEventListener("click", () => {
            State.modoDual = !State.modoDual;
            State.dualFlip = false;
            $("dual").textContent = State.modoDual ? "ES-DE" : "DE";
            $("dual").className = State.modoDual ? "btn btn-secondary" : "btn btn-danger";
        });
        $("leer")?.addEventListener("click", async () => {
            if (speechSynthesis.speaking) speechSynthesis.cancel();
            if (State.modoAuto) {
            speakLoop();
            } else if (State.modoDual) {
            await speakOnce($("p2")?.textContent || "", "de");
            await speakOnce($("p1")?.textContent || "", "es");
            } else {
            await speakOnce($("p2")?.textContent || "", "de");
            }
        });
        }

        /* ========================= INIT ========================= */
        // Punto de entrada: crea botones de sets, vincula eventos y carga la lista1 por defecto.
        function init() {
        mountSetButtons();
        bindSelectionEvents();
        bindRepeatControls();
        setActiveSet("lista1");
        }

        document.addEventListener("DOMContentLoaded", init);
        </script>    
</body>
</html>
